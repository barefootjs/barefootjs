name: CI — Core

on:
  push:
    branches: [main]
    paths:
      - 'packages/client/**'
      - 'packages/jsx/**'
      - 'packages/form/**'
      - 'packages/test/**'
      - 'packages/chart/**'
      - 'packages/xyflow/**'
      - 'packages/adapter-tests/**'
      # site/ui is the Hono adapter's end-to-end target, so Hono changes must
      # re-run this workflow's e2e-site-ui job (ci-hono.yml no longer duplicates it).
      - 'packages/hono/**'
      - 'ui/**'
      - 'site/ui/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'packages/client/**'
      - 'packages/jsx/**'
      - 'packages/form/**'
      - 'packages/test/**'
      - 'packages/chart/**'
      - 'packages/xyflow/**'
      - 'packages/adapter-tests/**'
      # site/ui is the Hono adapter's end-to-end target, so Hono changes must
      # re-run this workflow's e2e-site-ui job (ci-hono.yml no longer duplicates it).
      - 'packages/hono/**'
      - 'ui/**'
      - 'site/ui/**'
      - '.github/workflows/ci.yml'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build packages
        run: |
          bun run --filter '@barefootjs/client' build
          bun run --filter '@barefootjs/jsx' build

      - name: Run unit tests
        run: bun test packages/client packages/jsx packages/test packages/adapter-tests

  test-ui:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build packages
        run: |
          bun run --filter '@barefootjs/client' build
          bun run --filter '@barefootjs/jsx' build

      - name: Run UI component IR tests
        run: bun test ui/components/

  e2e-site-ui:
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]

    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build packages
        run: |
          bun run --filter '@barefootjs/client' build
          bun run --filter '@barefootjs/jsx' build
          bun run --filter '@barefootjs/form' build
          bun run --filter '@barefootjs/chart' build
          bun run --filter '@barefootjs/hono' build

      - name: Build site/ui
        run: cd site/ui && bun run build

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('bun.lock') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: bunx playwright install --with-deps chromium

      - name: Install Playwright system deps only
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: bunx playwright install-deps chromium

      - name: Run site/ui E2E tests (shard ${{ matrix.shard }}/4)
        run: cd site/ui && bunx playwright test --shard=${{ matrix.shard }}/4

      - name: Upload Playwright report (site/ui)
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-site-ui-shard-${{ matrix.shard }}
          path: site/ui/playwright-report/
          retention-days: 30

  e2e-echo:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build packages
        run: |
          bun run --filter '@barefootjs/client' build
          bun run --filter '@barefootjs/jsx' build
          bun run --filter '@barefootjs/go-template' build

      - name: Build integrations/echo
        run: cd integrations/echo && bun run build

      - name: Download Go dependencies
        run: cd integrations/echo && go mod download

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('bun.lock') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: bunx playwright install --with-deps chromium

      - name: Install Playwright system deps only
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: bunx playwright install-deps chromium

      - name: Run integrations/echo E2E tests
        run: cd integrations/echo && bun run test:e2e

      - name: Upload Playwright report (integrations/echo)
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-integrations-echo
          path: integrations/echo/playwright-report/
          retention-days: 30
