name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report this!

        > **Note:** We don't accept external pull requests due to supply-chain and AI-slop concerns.
        > That said, design discussions and debugging help in issues are very welcome — and your
        > contributions here will be credited as `Co-authored-by` in the fixing commit.
        >
        > Happy hacking!

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the behavior.
      placeholder: |
        1. Create a component with ...
        2. Compile with ...
        3. See error ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Version info and relevant environment details.
      placeholder: |
        - BarefootJS version:
        - Adapter (Hono / Go Template / etc.):
        - Runtime (Bun / Node / Deno):
        - OS:
    validations:
      required: false
